supply_chains:
- id: soy_to_eu_main
  name: Soja-Hauptlieferkette Brasilien-EU
  stages:
  - - brazil_farms
    - santos_port
  - - santos_port
    - rotterdam_port
  - - rotterdam_port
    - eu_oil_mills
  - - eu_oil_mills
    - feed_mills
  - - feed_mills
    - poultry_farms
  - - feed_mills
    - pig_farms
  - - feed_mills
    - dairy_farms
  - - eu_oil_mills
    - soy_oil_market
  - - poultry_farms
    - food_retail
  - - pig_farms
    - food_retail
  - - dairy_farms
    - food_retail
  - - food_retail
    - consumers
  - - alternative_protein_sources
    - feed_mills
  - - strategic_feed_reserves
    - feed_mills
  dependencies:
  - from: eu_oil_mills
    to: gas_supply
    type: energy
    criticality: high
  - from: brazil_farms
    to: fertilizer_supply
    type: input
    criticality: medium
  - from: feed_mills
    to: eu_oil_mills
    type: input
    criticality: high
  - from: poultry_farms
    to: feed_mills
    type: input
    criticality: high
  - from: pig_farms
    to: feed_mills
    type: input
    criticality: high
  - from: dairy_farms
    to: feed_mills
    type: input
    criticality: medium
  - from: alternative_protein_sources
    to: feed_mills
    type: substitution
    substitution_ref: sub_protein_replacement
    criticality: medium
  - from: strategic_feed_reserves
    to: feed_mills
    type: substitution
    substitution_ref: sub_strategic_reserves
    criticality: low
- id: soy_to_eu_secondary
  name: Soja-Nebenlieferkette Paranaguá
  stages:
  - - brazil_farms
    - paranagua_port
  - - paranagua_port
    - hamburg_port
  - - hamburg_port
    - eu_oil_mills
- id: soy_argentina_route
  name: Argentinien-Alternativroute
  stages:
  - - argentina_farms
    - rotterdam_port
  - - rotterdam_port
    - eu_oil_mills
- id: soy_us_emergency_route
  name: USA-Notfall-Lieferkette
  stages:
  - - us_farms
    - us_gulf_ports
  - - us_gulf_ports
    - rotterdam_port
  - - rotterdam_port
    - eu_oil_mills
  dependencies:
  - from: eu_oil_mills
    to: us_farms
    type: input
    criticality: medium
- id: feedback_loops_chain
  name: Feedback-Schleifen (Rückkopplungseffekte)
  stages:
  - - consumers
    - feed_mills
  - - poultry_farms
    - feed_mills
  - - pig_farms
    - feed_mills
  dependencies:
  - from: feed_mills
    to: poultry_farms
    type: demand
    criticality: medium
    note: Bestandsabbau reduziert Futternachfrage
  - from: feed_mills
    to: consumers
    type: demand
    criticality: medium
    note: Fleischsubstitution reduziert Nachfrage
substitutions:
- id: sub_protein_replacement
  from: eu_oil_mills
  to: alternative_protein_sources
  type: product
  coverage: 0.2
  quality_delta: -0.12
  cost_delta: 0.3
  ramp_up: 21d
  activation:
    trigger: feed_price_spike.active
    threshold:
      price_increase: 0.25
  reversible: true
  side_effects:
  - type: price_pressure
    target: alternative_protein_sources
    magnitude: 0.2
    description: Mehrnachfrage nach Rapsschrot treibt dessen Preis
  - type: quality_loss
    target: poultry_farms
    magnitude: -0.05
    description: Geflügel reagiert sensibler auf Proteingehalt als Schweine
  dependency_overlap:
  - fertilizer_supply
  - gas_supply
  reference: 'UFOP 2022: Rapsschrot-Substitutionspotenzial ~15-20% bei Sojapreisschocks'
- id: sub_supplier_argentina
  from: brazil_farms
  to: argentina_farms
  type: supplier
  coverage: 0.067
  quality_delta: 0.0
  cost_delta: 0.15
  ramp_up: 14d
  activation:
    trigger: soy_export_reduction.active
  reversible: true
  side_effects:
  - type: correlated_risk
    description: Bei gleichzeitiger La-Niña-Dürre auch AR betroffen (2021/22 tatsächlich eingetreten)
  dependency_overlap:
  - fertilizer_supply
  reference: 'USDA GATS 2022: Argentinien kompensiert BR-Ausfälle teilweise, korreliertes Klimarisiko'
  _kg_source:
    baci_coverage_formula: ARG/1201 / BRA/1201 = 4,831,771 / 88,173,187 = 0.055 → capped 0.055
  _icio_source:
    formula: ARG/1201 / BRA/1201 = 3253 / 48360
    year: 2022
    old_value: 0.055
- id: sub_supplier_usa
  from: brazil_farms
  to: us_farms
  type: supplier
  coverage: 0.7
  quality_delta: 0.0
  cost_delta: 0.25
  ramp_up: 30d
  activation:
